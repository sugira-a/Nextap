app = "nextap-1uqfq"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python -c \"from backend.run import app, db; ctx = app.app_context(); ctx.push(); db.create_all()\""

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
